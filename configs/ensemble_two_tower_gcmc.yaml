# Гибридная модель: ансамбль двубашенной модели SASRec-вида и GCMC.
# Используется для проверки, дополняют ли графовые представления retrieval-модель.

experiment:
  name: ensemble_two_tower_gcmc
  seed: 42

data:
  root: data/movielens20-withfeatures-split
  train_file: train_warm_interactions.parquet
  val_file: warm_val_interactions.parquet
  test_file: warm_test_interactions.parquet
  positive_threshold: 4.0

model:
  name: ensemble_two_tower_gcmc
  two_tower_checkpoint: checkpoints/two_tower_sasrec.pt
  gcmc_checkpoint: checkpoints/gcmc_rating_relation.pt
  fusion_type: weighted_sum
  trainable_fusion_weights: true
  finetune_backbones: false

train:
  epochs: 5
  batch_size: 1024
  learning_rate: 0.0001
  weight_decay: 0.000001
  use_amp: true

eval:
  k_values: [10, 20, 50]
  main_metric: ndcg@20
  eval_scenarios:
    - warm
    - cold_user
    - cold_item
    - both_cold
